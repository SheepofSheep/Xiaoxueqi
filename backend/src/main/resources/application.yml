server:
  port: 8080

spring:
  application:
    name: food-seeker
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:${DB_PATH:./data/food-seeker.db}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-string-at-least-256-bits}
    expiration-hours: 24
  amap:
    web-service-key: ${AMAP_WEB_SERVICE_KEY:}
  deepseek:
    enabled: ${DEEPSEEK_ENABLED:false}
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:15}
    reason-polish-enabled: ${DEEPSEEK_REASON_POLISH_ENABLED:false}
